# Fly.io config for mochi-position-manager
# Docs: https://fly.io/docs/reference/configuration/
#
# First-time setup:
#   1. brew install flyctl  (or: curl -L https://fly.io/install.sh | sh)
#   2. fly auth signup     (or: fly auth login)
#   3. fly launch --no-deploy --copy-config --name mochi-position-manager --region sin
#   4. fly volumes create data --size 1 --region sin
#   5. fly secrets set WEBHOOK_SECRET=<long-random> BYBIT_API_KEY=... BYBIT_API_SECRET=...
#      fly secrets set HYPERLIQUID_PRIVATE_KEY=0x... HYPERLIQUID_ACCOUNT_ADDRESS=0x...
#      fly secrets set TELEGRAM_BOT_TOKEN=... TELEGRAM_CHAT_ID=...
#   6. fly deploy
#   7. fly ssh sftp shell  -> put your local strategies.yaml to /app/data/strategies.yaml
#      (or edit via:  fly ssh console -> vi /app/data/strategies.yaml)
#   8. fly apps restart    (so the router picks up strategies.yaml)
#
# Public URL after deploy:  https://<app-name>.fly.dev
# TradingView webhook URL:  https://<app-name>.fly.dev/webhook/tradingview

app = "mochi-position-manager"
primary_region = "sin"   # Singapore — closest to Bybit. Change to "iad" (US-East), "fra" (EU), etc.

[build]

[env]
  DATABASE_URL = "sqlite:////app/data/middleware.db"
  STRATEGIES_FILE = "/app/data/strategies.yaml"
  LOG_LEVEL = "INFO"
  DRY_RUN = "false"
  BYBIT_TESTNET = "false"
  HYPERLIQUID_TESTNET = "false"

# Persistent disk for SQLite + strategies.yaml.
# DO NOT remove — losing this loses the position ledger and dedup history.
[mounts]
  source = "data"
  destination = "/app/data"

[http_service]
  internal_port = 8000
  force_https = true
  # CRITICAL for a webhook receiver: never auto-stop.
  # A stopped machine returns 502 to TradingView, which silently drops the alert.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

# Health check — Fly will restart the machine if /health stops responding.
[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "15s"
  method = "GET"
  path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
