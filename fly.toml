# fly.toml app configuration file generated for mochi-position-manager-mellowed-water-2066 on 2026-05-27T13:17:19-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mochi-position-manager-mellowed-water-2066'
primary_region = 'sin'

[build]

[env]
  BYBIT_TESTNET = 'false'
  DATABASE_URL = 'sqlite:////app/data/middleware.db'
  DRY_RUN = 'false'
  HYPERLIQUID_TESTNET = 'false'
  LOG_LEVEL = 'INFO'
  STRATEGIES_FILE = '/app/data/strategies.yaml'

[[mounts]]
  source = 'data'
  destination = '/app/data'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 100
    soft_limit = 50

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
