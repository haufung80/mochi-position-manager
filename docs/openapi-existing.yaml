components:
  schemas:
    ArbCloseRequest:
      properties:
        arb_id:
          exclusiveMinimum: 0.0
          title: Arb Id
          type: integer
      required:
      - arb_id
      title: ArbCloseRequest
      type: object
    ArbCloseResponse:
      properties:
        arb_id:
          title: Arb Id
          type: integer
        status:
          enum:
          - closing
          - already_closed
          title: Status
          type: string
      required:
      - status
      - arb_id
      title: ArbCloseResponse
      type: object
    ArbLegView:
      description: Per-leg status for the status endpoint.
      properties:
        account:
          title: Account
          type: string
        avg_fill:
          default: 0.0
          title: Avg Fill
          type: number
        exchange:
          enum:
          - bybit
          - hyperliquid
          title: Exchange
          type: string
        filled_qty:
          default: 0.0
          description: NET base quantity received (spot buys are net of base-coin
            fees) — the actually-held, hedgeable quantity.
          title: Filled Qty
          type: number
        funding:
          anyOf:
          - type: number
          - type: 'null'
          description: Funding harvested by this leg (spot legs contribute 0; None
            until first settlement).
          title: Funding
        product:
          enum:
          - spot
          - perp
          title: Product
          type: string
        side:
          enum:
          - buy
          - sell
          title: Side
          type: string
        status:
          description: pending | success | retrying | dead | error | closed
          enum:
          - pending
          - success
          - retrying
          - dead
          - error
          - closed
          title: Status
          type: string
        symbol:
          title: Symbol
          type: string
        target_qty:
          title: Target Qty
          type: number
      required:
      - exchange
      - account
      - product
      - symbol
      - side
      - target_qty
      - status
      title: ArbLegView
      type: object
    ArbOpenRequest:
      description: 'Open one delta-neutral funding-arb position.


        ``legs`` omitted ⇒ the **default single-venue Hyperliquid cash-and-carry**

        combo (long HL spot + short HL perp, same dedicated HL ``arb`` account, perp

        at 1x). Provide ``legs[]`` to select another combo. ``idempotency_key`` is
        the

        dedup gate (a repeat returns ``status="duplicate"``), mirroring the webhook

        path.'
      examples:
      - asset: BTC
        idempotency_key: sig-2026-06-07T00:00:00Z-BTC
        notional: 1000.0
        size_mode: notional
        strategy_tag: hl-cash-and-carry
      - asset: ETH
        idempotency_key: sig-2026-06-07T00:00:00Z-ETH
        legs:
        - account: arb
          exchange: bybit
          product: spot
          side: buy
        - account: arb
          exchange: bybit
          product: perp
          side: sell
        notional: 2500.0
        size_mode: notional
        strategy_tag: bybit-cash-and-carry
      properties:
        asset:
          enum:
          - BTC
          - ETH
          - SOL
          - HYPE
          - PURR
          title: Asset
          type: string
        idempotency_key:
          description: Caller-supplied dedup key; a repeat open returns 'duplicate'.
          maxLength: 200
          minLength: 1
          title: Idempotency Key
          type: string
        legs:
          anyOf:
          - items:
              $ref: '#/components/schemas/LegSpec'
            type: array
          - type: 'null'
          description: Explicit legs. Omit for the default single-venue Hyperliquid
            cash-and-carry combo.
          title: Legs
        notional:
          anyOf:
          - exclusiveMinimum: 0.0
            type: number
          - type: 'null'
          description: USD notional per leg. Required (> 0) when size_mode='notional';
            ignored when size_mode='min'.
          title: Notional
        size_mode:
          default: notional
          description: '''notional'' sizes each leg from `notional`; ''min'' (paper
            mode) ignores `notional` and sizes each leg to the exchange minimum order
            size (real but tiny orders).'
          enum:
          - notional
          - min
          title: Size Mode
          type: string
        strategy_tag:
          anyOf:
          - maxLength: 128
            type: string
          - type: 'null'
          title: Strategy Tag
      required:
      - idempotency_key
      - asset
      title: ArbOpenRequest
      type: object
    ArbOpenResponse:
      properties:
        arb_id:
          title: Arb Id
          type: integer
        idempotency_key:
          title: Idempotency Key
          type: string
        legs:
          items:
            $ref: '#/components/schemas/SizedLeg'
          title: Legs
          type: array
        status:
          enum:
          - accepted
          - duplicate
          title: Status
          type: string
      required:
      - status
      - arb_id
      - idempotency_key
      - legs
      title: ArbOpenResponse
      type: object
    ArbPnL:
      description: PnL breakdown for one arb. Funding is the point; fees and basis
        net it.
      properties:
        commission_total:
          title: Commission Total
          type: number
        directional_net:
          description: Spot + perp directional PnL; ≈0 is the neutrality health check.
          title: Directional Net
          type: number
        funding_by_leg:
          additionalProperties:
            type: number
          description: Per-leg funding keyed by 'exchange:account:symbol'.
          title: Funding By Leg
          type: object
        funding_total:
          title: Funding Total
          type: number
        net:
          description: funding_total − commission_total (+ basis).
          title: Net
          type: number
        perp_unrealized:
          title: Perp Unrealized
          type: number
        spot_unrealized:
          title: Spot Unrealized
          type: number
      required:
      - funding_total
      - commission_total
      - spot_unrealized
      - perp_unrealized
      - directional_net
      - net
      title: ArbPnL
      type: object
    ArbPositionView:
      description: Full status of one arb position (the status endpoint payload).
      properties:
        arb_id:
          title: Arb Id
          type: integer
        asset:
          enum:
          - BTC
          - ETH
          - SOL
          - HYPE
          - PURR
          title: Asset
          type: string
        closed_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Closed At
        error_message:
          anyOf:
          - type: string
          - type: 'null'
          title: Error Message
        legs:
          items:
            $ref: '#/components/schemas/ArbLegView'
          title: Legs
          type: array
        neutral:
          description: True when both legs are filled and balanced.
          title: Neutral
          type: boolean
        neutrality_skew:
          description: long_leg.filled − short_leg.filled (base, net of fees); 0 =
            balanced.
          title: Neutrality Skew
          type: number
        opened_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Opened At
        pnl:
          $ref: '#/components/schemas/ArbPnL'
        status:
          enum:
          - opening
          - open
          - closing
          - closed
          - error
          title: Status
          type: string
      required:
      - arb_id
      - asset
      - status
      - neutral
      - neutrality_skew
      - legs
      - pnl
      title: ArbPositionView
      type: object
    Body_audit_pnl_admin_strategies_audit_post:
      properties:
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_audit_pnl_admin_strategies_audit_post
      type: object
    Body_backfill_entries_admin_strategies_backfill_entries_post:
      properties:
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_backfill_entries_admin_strategies_backfill_entries_post
      type: object
    Body_delete_strategy_admin_strategies_delete__sid__post:
      properties:
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_delete_strategy_admin_strategies_delete__sid__post
      type: object
    Body_reload_strategies_admin_reload_strategies_post:
      properties:
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_reload_strategies_admin_reload_strategies_post
      type: object
    Body_set_position_size_admin_strategies_set_size__sid__post:
      properties:
        position_size:
          default: ''
          title: Position Size
          type: string
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_set_position_size_admin_strategies_set_size__sid__post
      type: object
    Body_sync_positions_admin_strategies_sync_positions_post:
      properties:
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_sync_positions_admin_strategies_sync_positions_post
      type: object
    Body_toggle_sar_admin_strategies_toggle_sar__sid__post:
      properties:
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_toggle_sar_admin_strategies_toggle_sar__sid__post
      type: object
    Body_toggle_venue_admin_strategies_toggle__sid___exchange__post:
      properties:
        secret:
          title: Secret
          type: string
      required:
      - secret
      title: Body_toggle_venue_admin_strategies_toggle__sid___exchange__post
      type: object
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          title: Detail
          type: array
      title: HTTPValidationError
      type: object
    LegSpec:
      description: 'One leg of an arbitrage pair, fully self-describing.


        Identity lives on the leg — ``(exchange, account, product, side)`` — which
        is

        what lets a single schema express every combo (single-venue HL/Bybit

        cash-and-carry, cross-exchange perp-perp, spot + cross-perp) and any future

        N-leg arb. ``(exchange=hyperliquid, product=spot)`` is VALID.'
      examples:
      - account: arb
        exchange: hyperliquid
        product: spot
        side: buy
      - account: arb
        exchange: hyperliquid
        product: perp
        side: sell
      properties:
        account:
          default: arb
          description: Credential bucket / sub-account label. Defaults to the dedicated
            'arb' account so arb fills never net against the directional book.
          title: Account
          type: string
        exchange:
          enum:
          - bybit
          - hyperliquid
          title: Exchange
          type: string
        product:
          enum:
          - spot
          - perp
          title: Product
          type: string
        side:
          enum:
          - buy
          - sell
          title: Side
          type: string
        target_qty:
          anyOf:
          - exclusiveMinimum: 0.0
            type: number
          - type: 'null'
          description: 'Target base-asset quantity for this leg. Optional: when omitted
            the leg is sized at open time from `notional`/`size_mode`. When provided
            on both legs they must be equal (delta-neutral).'
          title: Target Qty
      required:
      - exchange
      - product
      - side
      title: LegSpec
      type: object
    SizedLeg:
      description: A leg after the open endpoint resolved the combo and sized it.
      properties:
        account:
          default: arb
          title: Account
          type: string
        exchange:
          enum:
          - bybit
          - hyperliquid
          title: Exchange
          type: string
        product:
          enum:
          - spot
          - perp
          title: Product
          type: string
        side:
          enum:
          - buy
          - sell
          title: Side
          type: string
        symbol:
          description: Exchange-native symbol (e.g. BTC, BTCUSDT).
          title: Symbol
          type: string
        target_qty:
          description: Resolved base-asset quantity for the leg.
          title: Target Qty
          type: number
      required:
      - exchange
      - product
      - symbol
      - side
      - target_qty
      title: SizedLeg
      type: object
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          title: Location
          type: array
        msg:
          title: Message
          type: string
        type:
          title: Error Type
          type: string
      required:
      - loc
      - msg
      - type
      title: ValidationError
      type: object
  securitySchemes:
    ArbSecret:
      in: header
      name: X-Arb-Secret
      type: apiKey
info:
  description: Auto-generated by scripts/dump_openapi.py — DO NOT EDIT BY HAND. Convenience
    artifact for the WHOLE app; the legacy directional routes return untyped raw dicts,
    so their response bodies are not contract-typed and this file is informational
    only (it is NOT drift-gated in CI). Run `make openapi` to regenerate.
  title: TradingView Middleware
  version: 0.1.0
openapi: 3.1.0
paths:
  /:
    get:
      operationId: dashboard__get
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
      summary: Dashboard
  /admin/reload-strategies:
    post:
      operationId: reload_strategies_admin_reload_strategies_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_reload_strategies_admin_reload_strategies_post'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Reload Strategies
      tags:
      - admin
  /admin/strategies:
    get:
      operationId: strategies_page_admin_strategies_get
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
      summary: Strategies Page
      tags:
      - admin
    post:
      description: 'Upsert a strategy. Form fields:

        secret, strategy_id, base_asset, venue_<exchange> (checkbox)'
      operationId: save_strategy_admin_strategies_post
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
      summary: Save Strategy
      tags:
      - admin
  /admin/strategies/audit:
    post:
      description: 'Read-only reconciliation report: per-strategy ledger vs fill-replay,
        and

        per-symbol ledger vs the live exchange. Surfaces PnL/position drift on demand.'
      operationId: audit_pnl_admin_strategies_audit_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_audit_pnl_admin_strategies_audit_post'
        required: true
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Audit Pnl
      tags:
      - admin
  /admin/strategies/backfill-entries:
    post:
      description: 'Rebuild avg_entry_price from historical klines for open positions
        whose fills

        weren''t recorded with a price (only when the fills explain the stored net),
        so

        per-strategy unrealized is real. Realized PnL is NOT touched here — it''s
        owned by

        the live executor (reconstructing it from a truncated history fabricates profit).'
      operationId: backfill_entries_admin_strategies_backfill_entries_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_backfill_entries_admin_strategies_backfill_entries_post'
        required: true
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Backfill Entries
      tags:
      - admin
  /admin/strategies/delete/{sid}:
    post:
      operationId: delete_strategy_admin_strategies_delete__sid__post
      parameters:
      - in: path
        name: sid
        required: true
        schema:
          title: Sid
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_delete_strategy_admin_strategies_delete__sid__post'
        required: true
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Delete Strategy
      tags:
      - admin
  /admin/strategies/set-size/{sid}:
    post:
      description: 'Set/clear a managed strategy''s position_size inline — leaves
        base_asset,

        venues and SAR untouched. Blank clears it (paper mode).'
      operationId: set_position_size_admin_strategies_set_size__sid__post
      parameters:
      - in: path
        name: sid
        required: true
        schema:
          title: Sid
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_set_position_size_admin_strategies_set_size__sid__post'
        required: true
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Set Position Size
      tags:
      - admin
  /admin/strategies/sync-positions:
    post:
      description: 'Re-baseline the per-strategy ledger to live exchange positions,
        clearing

        stale residue. Reads live state per configured strategy/venue.'
      operationId: sync_positions_admin_strategies_sync_positions_post
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_sync_positions_admin_strategies_sync_positions_post'
        required: true
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Sync Positions
      tags:
      - admin
  /admin/strategies/toggle-sar/{sid}:
    post:
      description: Flip a strategy's stop-and-reverse marker (label only — no order
        change).
      operationId: toggle_sar_admin_strategies_toggle_sar__sid__post
      parameters:
      - in: path
        name: sid
        required: true
        schema:
          title: Sid
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_toggle_sar_admin_strategies_toggle_sar__sid__post'
        required: true
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Toggle Sar
      tags:
      - admin
  /admin/strategies/toggle/{sid}/{exchange}:
    post:
      description: Flip a single venue's enabled bit.
      operationId: toggle_venue_admin_strategies_toggle__sid___exchange__post
      parameters:
      - in: path
        name: sid
        required: true
        schema:
          title: Sid
          type: string
      - in: path
        name: exchange
        required: true
        schema:
          title: Exchange
          type: string
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Body_toggle_venue_admin_strategies_toggle__sid___exchange__post'
        required: true
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Toggle Venue
      tags:
      - admin
  /alerts:
    get:
      operationId: alerts_json_alerts_get
      parameters:
      - in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 1000
          minimum: 1
          title: Limit
          type: integer
      responses:
        '200':
          content:
            application/json:
              schema: {}
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Alerts Json
  /funding-arb:
    get:
      description: 'Dark-theme funding-arb report: one row per ``ArbPosition`` with
        nested legs,

        headline = funding harvested − fees, per-leg funding (spot 0) / spot+perp

        unrealized / directional-net (≈0 health check) / neutrality skew.


        **AUTH (deliberate, documented):** this is an HTML page reached by BROWSER

        NAVIGATION, which cannot attach a custom ``X-Arb-Secret`` header (a fetch
        can,

        a ``<a href>`` click can''t). It is therefore gated EXACTLY like the existing

        ``/performance`` page — currently OPEN (no auth dependency) — and NOT behind

        ``require_arb_secret``. The JSON ``/funding-arb/{open,close,positions}`` API

        routes that the signal app calls programmatically stay behind ``X-Arb-Secret``

        as-is. (If ``/performance`` is later gated by ``WEBHOOK_SECRET``, gate this
        the

        same way for parity — they share the same browser-nav threat model.)'
      operationId: arb_report_page_funding_arb_get
      parameters:
      - in: query
        name: equity_window
        required: false
        schema:
          default: 30D
          title: Equity Window
          type: string
      - in: query
        name: refresh
        required: false
        schema:
          default: false
          title: Refresh
          type: boolean
      responses:
        '200':
          content:
            text/html:
              schema:
                type: string
          description: Successful Response
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      summary: Funding-arb reporting page (HTML)
      tags:
      - funding-arb
  /funding-arb/close:
    post:
      description: 'Set ``status=closing`` and schedule ``_run_close``. **404** unknown
        id;

        **409** already closed (or closing).'
      operationId: close_arb_funding_arb_close_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArbCloseRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbCloseResponse'
          description: Successful Response
        '401':
          description: Missing or incorrect X-Arb-Secret.
        '404':
          description: No arb with that id.
        '409':
          description: Arb already closed.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '503':
          description: Funding-arb API not configured (FUNDING_ARB_SECRET unset).
      security:
      - ArbSecret: []
      summary: Close an open funding-arb position
      tags:
      - funding-arb
  /funding-arb/open:
    post:
      description: 'Authorise → resolve combo (explicit ``legs`` or the default HL
        combo) →

        reject (409) if any leg''s ``(exchange, account, symbol)`` is already held
        by a

        non-closed arb → size the pair → persist ``ArbPosition`` + ``ArbLeg``s in
        ONE

        short txn (dedup via ``IntegrityError`` on ``idempotency_key`` → ``duplicate``)

        → return ``accepted`` + sized legs → schedule ``_run_open``.'
      operationId: open_arb_funding_arb_open_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArbOpenRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArbOpenResponse'
          description: Successful Response
        '401':
          description: Missing or incorrect X-Arb-Secret.
        '409':
          description: A leg symbol is already held by a non-closed arb.
        '422':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
        '503':
          description: Funding-arb API not configured (FUNDING_ARB_SECRET unset).
      security:
      - ArbSecret: []
      summary: Open a delta-neutral funding-arb position
      tags:
      - funding-arb
